<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta content="ie=edge" http-equiv="X-UA-Compatible" />
    <title>Around The U.S.</title>
    <link href="./pages/index.css" rel="stylesheet" />
    <link
      rel="icon"
      type="image/png"
      href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRoq1Jz_vdHHovzNbuGPx9DfmkLGUOZ3NGvaTJflWbLLw&s=10"
    />
  </head>

  <body class="page">
    <div class="page__content">
      <header class="header page__section">
        <img
          alt="Logotipo Around The U.S."
          class="logo header__logo"
          src="./images/logo.svg"
        />
      </header>
      <main class="content">
        <section class="profile page__section">
          <img class="profile__image" src="./images/avatar.jpg" alt="Avatar" />
          <div class="profile__info">
            <h1 class="profile__title">Jacques Cousteau</h1>
            <button
              aria-label="Editar perfil"
              class="profile__edit-button"
              type="button"
            ></button>
            <p class="profile__description">Explorador</p>
          </div>
          <button
            aria-label="Agregar tarjeta"
            class="profile__add-button"
            type="button"
          ></button>
        </section>
        <section class="cards page__section">
          <ul class="cards__list">
            <template id="card__template">
              <li class="card">
                <img src="" alt="" class="card__image" />
                <button
                  aria-label="Eliminar tarjeta"
                  class="card__delete-button"
                  type="button"
                ></button>
                <div class="card__description">
                  <h2 class="card__title"></h2>
                  <button
                    aria-label="Botón Me gusta"
                    class="card__like-button"
                    type="button"
                  ></button>
                </div>
              </li>
            </template>
          </ul>
        </section>
      </main>
      <footer class="footer page__section">
        <p class="footer__copyright">© 2025 Around The U.S.</p>
      </footer>
      <div class="popup" id="edit-popup">
        <div class="popup__content">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <h3 class="popup__title">Editar perfil</h3>
          <form class="popup__form" id="edit-profile-form">
            <input
              type="text"
              name="name"
              class="popup__input popup__input_type_name"
              placeholder="Nombre"
              id="name-input"
              minlength="2"
              maxlength="40"
              required
            />
            <span class="name-input-error popup__input-error"></span>
            <input
              class="popup__input popup__input_type_description"
              name="description"
              placeholder="Acerca de mí"
              type="text"
              id="description-input"
              minlength="2"
              maxlength="200"
              required
            />
            <span class="description-input-error popup__input-error"></span>
            <input
              type="url"
              name="profile-image"
              class="popup__input popup__input_type_profile-image"
              placeholder="Profile image"
              id="profile-image-input"
              required
            />
            <span class="profile-image-input-error popup__input-error"></span>
            <button class="button popup__button" type="submit">Guardar</button>
          </form>
        </div>
      </div>
      <div class="popup" id="new-card-popup">
        <div class="popup__content">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <h3 class="popup__title">Nuevo lugar</h3>
          <form class="popup__form" id="new-card-form">
            <input
              type="text"
              name="place-name"
              id="place-name-input"
              class="popup__input popup__input_type_card-name"
              placeholder="Título"
              minlength="2"
              maxlength="30"
              required
            />
            <span class="place-name-input-error popup__input-error"></span>
            <input
              type="url"
              name="link"
              id="link-input"
              class="popup__input popup__input_type_url"
              placeholder="Enlace a la imagen"
              required
            />
            <span class="link-input-error popup__input-error"></span>
            <button class="button popup__button" type="submit">Crear</button>
          </form>
        </div>
      </div>
      <div class="popup" id="image-popup">
        <div class="popup__content popup__content_content_image">
          <button
            aria-label="Cerrar ventana emergente"
            class="popup__close"
            type="button"
          ></button>
          <img alt="" class="popup__image" src="#" />
          <p class="popup__caption"></p>
        </div>
      </div>
    </div>
    <script src="./index.js" defer></script>
  </body>
</html>
